2026-03-03:
  FreeStylaLT:
  - balance: Aasimar lux is now purified, but their 'devitalised' period lasts longer.
  - balance: Tieflings cannot have their Lux extracted. It is infernal and incompatible.
  - balance: Light Steps now muffles armor sounds when walking.
  - balance: Removed dual wielder still giving an offensive advantage in certain scenarios.
  Ketrai:
  - balance: Lithmyc maces are stronger now.
  Lamasmaster:
  - rscdel: Necra's Vow
  - balance: Desert Rider Janissary
  NewyearnewmeUwu:
  - qol: Master level or higher medicine skill will let you check for a soul upon
      heartbeat listening.
  Ollanius:
  - rscdel: Eora's Tree no longer explodes ugly people.
  - rscadd: Eora's Tree now explodes people who've been cursed by Eora.
  - rscadd: Eora's Tree very rarely blesses people with leprosy.
  - rscadd: Eora's Tree very rarely blesses people with ugliness, temporarily gifting
      them beauty at the cost of Constitution.
  - code_imp: Added more distinct coloration to the 'blessed-by-Eora's-Tree' messages.
  - rscadd: Adds tutorials (for most core mechanics) to most commonplace items, turfs,
      and effects in the game. These tutorials can be accessed by clicking the 'Mechanics'
      tab, which shows up in the chatbox when examining applicable things.
  - rscadd: 'Turns the Survival Handbook into ''Tips, Tricks & Triumphs: The Azurian
      Survival Guide.'' It has a unique sprite, now provides important information
      to help orient new-and-returning players, and can be redeemed at the Stockpile
      for change.'
  - balance: Threshers now have the Flail's smashing intent, when wielded.
  - balance: Whole pies and cheese wheels can now be bitten more times, for those
      who adore gluttony in its rawest form.
  - balance: Adds an alternate recipe to the potter's wheel, requiring whetstones
      instead of bronze cogs. The bronze-cogged variant is now a little simpler to
      create, to compensate.
  - code_imp: Threshers now properly have their unique intent forked off of 'flail/thresh',
      instead of being 'flailthresh'.
  - code_imp: The new tutorials might be a little too verbose. Feel free to slim them
      down or rewrite them as seen fit.
  - code_imp: Tweaked 'rous master' to 'rousmaster.'
  - code_imp: Adjusted a variety of descriptions.
  - rscadd: A recipe for.. medicinal fish vinegear.. ? Indeed! Three fishes of any
      sort, a palmful of salt and sugar, a sprig of canedula, and a half-hour of your
      time for a bottle of this.. perplexingly safe ancestor to lifeblood. Bottoms
      up!
  - rscadd: Spiced wine! Brewed in a keg from two jackberries, a tangerine, and a
      palmful each of sugar, pumpkin spice, and rocknut. It's said to have minor healing
      properties, and - when fully aged - a uniquely aromatic and heavenly taste.
  - rscadd: Adds 'the Apple of Ambrosia', a golden fruit that never rots and provides
      strong healing to whoever eats it. It can be very rarely found in high-tier
      dungeon lootdrops, or purchased from the Hoardmaster for a high fee.
  - rscadd: Adds a description to the apple, and explains how people can put apples
      on their head as part of an archery-based minigame.
  - balance: The Paladin's 'Cleric' oath now receives Apprentice-tier medicine skills
      and a special needle, in addition to their regular health potion. Likewise,
      the 'Crusader' oath has lost its scabbard - for the sake of space - in favor
      of a new surcoat.
  - balance: The Decorated Sugarloaf Helmets given to Matthiosite Heretics and Undivided
      Paladins is a special variant, which will smelt into a regular amount of steel.
  - balance: Decorated Sugarloaf and Bucket Helmets now smelt into a single ingot
      of gold.
  - rscadd: Paladins can now opt to take no oath at all, which simply gifts them a
      unique silver ring in turn.
  - rscadd: Readds the Sugarloaf Helmets (and its Decorated variant), based off the
      old Stonekeep-era Crusader helms.
  - rscadd: Readds the Surcoats of the Golden + Silver Orders, acquirable via the
      loadout system and through sewing.
  - rscadd: Decorated Sugarloaf and Bucket Helmets can now be smithed through a series
      of Expert-tier armorsmithing recipes.
  - rscadd: Undivided or otherwise Unaligned Paladins now receive the new Surcoat
      of the Golden Order, instead of a Desert Cape.
  - rscadd: Adds the Barbute, Visored Barbute, and Great Barbute! Courtesy to Dakken
      (and Cre77) for the assets. These can be smithed, purchased, or acquired in
      the appropriate loadouts.
  - rscadd: Desert Capes and Heavy Surcoats have now been added to the loadout system.
  - rscadd: The original Stonekeep-era Surcoats (without verminfolk/dwarf sprites)
      can now be stitched together, exclusively.
  - rscadd: Greatplume Armets! These armet variants can accept a unique 64x64-scaled
      plume, which also happens to be greyscalable.
  - rscadd: Greatplume Froggemunds! These can accept orles as well, in addition to
      the standard plume.
  - rscadd: All bucket helmet variants can now accept an alternate detail, via applying
      a nurse's veil.
  - rscadd: Golden armets exclusively use the greatplume, now.
  - bugfix: Needles now properly show their strings.
  - code_imp: Adds tips to how needles work.
  - code_imp: Ensures code-parity with Ansari's decomponentization PR.
  - code_imp: Future reference - check 'crusader.dm' for the cloaks.
  - code_imp: The head.dmi for 64x64x sprites has an example of both a regular one-detail
      helmet and two-detail helmet, now, for future reference.
