author: "WeNeedMorePhoron"
delete-after: True
changes:
  - balance: "Weapon penetration reworked into a tier system (NONE/LIGHT/MEDIUM/HEAVY/BSTEEL). Penetration that exceeds armor passes 100%, matching tier passes 20%, below is blocked."
  - balance: "Armor consolidated from 16+ classes into 8 standardized tiers. Padded and Leather are now explicit sidegrades."
  - balance: "Ranged weapons (bows, longbows, slings) now scale uniformly off Perception with a softcap at 15. Slings no longer benefit from Strength."
  - balance: "Longbow damage factor increased to 1.3x. Broadhead arrow damage raised to 50 (PEN_LIGHT). Sling bullets raised to ~40 damage."
  - balance: "Estoc reworked into a 2H thrusting specialist with lunge (reach 2), halfsword (PEN_BSTEEL), and point-blank thrust (PEN_HEAVY)."
  - balance: "Longsword gains a fast 2H cut. Arming sword can no longer be two-handed."
  - balance: "Sabre thrust reduced to PEN_LIGHT."
  - balance: "STR post-softcap scaling increased from 3.4% to 5% per point."
  - balance: "Crit-susceptible and crit-preventing armor properties removed. Crits now depend purely on bodypart damage. In compensation, critical damage threshold raised to 90% again - blocking dismemberment and crits from occuring until 90% damage has accumulated on the limb. This does not affect most NPCs."
  - balance: "Gnoll Claws downgraded to MEDIUM Pen (Pen bad padded armor and padded armor, nothing else)"
  - balance: "All mage spells classified as BURN or ACID types. REDUCE armor mechanics added - they always go through to HP but a portion goes into the armor instead. Light Armor are good vs burn damage."
  - balance: "Removed the unique Grudgebearer layering mechanics. Soldier now start off with the equivalence of a full set of plate armor in protection and integrity instead."
  - balance: "Found and fixed a bug where penetrating ranged attacks (Bodkin / Bolts) were passing in the entirety of their unmitigated damage when rolling for crit. This might drastically affects the balance of AP ranged weapons so there will not be any additional."
  - balance: "Ruma's Tattoo raised to plate level protection and 250 integrity."
  - balance: "Hand's Gambeson is maille tier protection and moved to shirt slot."
  - rscdel: "Removed the Peel system entirely - all peel intents, coverage stripping, thresholds, and related code."
  - rscdel: "Removed pain stagger mechanic."
  - qol: "Added keybindable Alt Grip hotkey (default: 5) for mordhau and alternate grips."
  - qol: "Examining unarmored clothing now shows \"NO ARMOR!\" instead of empty tier dots (Or a F scoreboard card)"