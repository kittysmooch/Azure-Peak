author: "Ollanius"
delete-after: True
changes:
  - rscadd: "A recipe for.. medicinal fish vinegear.. ? Indeed! Three fishes of any sort, a palmful of salt and sugar, a sprig of canedula, and a half-hour of your time for a bottle of this.. perplexingly safe ancestor to lifeblood. Bottoms up!"
  - rscadd: "Spiced wine! Brewed in a keg from two jackberries, a tangerine, and a palmful each of sugar, pumpkin spice, and rocknut. It's said to have minor healing properties, and - when fully aged - a uniquely aromatic and heavenly taste."