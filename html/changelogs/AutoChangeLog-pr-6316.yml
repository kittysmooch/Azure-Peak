author: "WeNeedMorePhoron"
delete-after: True
changes:
  - balance: "Spells no longer gain additional stamina cost reduction from skills. Int up to 15 reduces cost (and cooldown) by up to 5% each point"
  - balance: "The entirety of all mage spells and spellblade spells stamina cost has been reworked and consolidated into categories. In general it should be lower. A further rework for miracles may come down the line."
  - balance: "Wearing medium / heavy armor imposes a 15 / 30% cooldown penalty when casting spells / miracles. 80% if you are not trained in it"
  - balance: "Spitfire & Fireball stamina cost and cooldown reduced to keep fire mage viable and good feeling until a major overhaul of mage is done"
  - balance: "Fetch & Repel now have a half second charge time for telegraphing"
  - balance: "Create Campfire now interrupts movement to reduce in combat abuse / usage"
  - balance: "Mirror Transform now only costs 5 stamina baseline instead of 35."