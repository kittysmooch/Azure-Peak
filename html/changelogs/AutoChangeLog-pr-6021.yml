author: "Ollanius"
delete-after: True
changes:
  - balance: "The Paladin's 'Cleric' oath now receives Apprentice-tier medicine skills and a special needle, in addition to their regular health potion. Likewise, the 'Crusader' oath has lost its scabbard - for the sake of space - in favor of a new surcoat."
  - balance: "The Decorated Sugarloaf Helmets given to Matthiosite Heretics and Undivided Paladins is a special variant, which will smelt into a regular amount of steel."
  - balance: "Decorated Sugarloaf and Bucket Helmets now smelt into a single ingot of gold."
  - rscadd: "Paladins can now opt to take no oath at all, which simply gifts them a unique silver ring in turn."
  - rscadd: "Readds the Sugarloaf Helmets (and its Decorated variant), based off the old Stonekeep-era Crusader helms."
  - rscadd: "Readds the Surcoats of the Golden + Silver Orders, acquirable via the loadout system and through sewing."
  - rscadd: "Decorated Sugarloaf and Bucket Helmets can now be smithed through a series of Expert-tier armorsmithing recipes."
  - rscadd: "Undivided or otherwise Unaligned Paladins now receive the new Surcoat of the Golden Order, instead of a Desert Cape."
  - rscadd: "Adds the Barbute, Visored Barbute, and Great Barbute! Courtesy to Dakken (and Cre77) for the assets. These can be smithed, purchased, or acquired in the appropriate loadouts."
  - rscadd: "Desert Capes and Heavy Surcoats have now been added to the loadout system."
  - rscadd: "The original Stonekeep-era Surcoats (without verminfolk/dwarf sprites) can now be stitched together, exclusively."
  - rscadd: "Greatplume Armets! These armet variants can accept a unique 64x64-scaled plume, which also happens to be greyscalable."
  - rscadd: "Greatplume Froggemunds! These can accept orles as well, in addition to the standard plume."
  - rscadd: "All bucket helmet variants can now accept an alternate detail, via applying a nurse's veil."
  - rscadd: "Golden armets exclusively use the greatplume, now."
  - bugfix: "Needles now properly show their strings."
  - code_imp: "Adds tips to how needles work."
  - code_imp: "Ensures code-parity with Ansari's decomponentization PR."
  - code_imp: "Future reference - check 'crusader.dm' for the cloaks."
  - code_imp: "The head.dmi for 64x64x sprites has an example of both a regular one-detail helmet and two-detail helmet, now, for future reference."