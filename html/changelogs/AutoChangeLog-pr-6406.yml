author: "WeNeedMorePhoron"
delete-after: True
changes:
  - rscadd: "Complete magic system overhaul - Aspect-based magic replaces free-pick spells. Mages now choose Major Aspects (offensive packages), Minor Aspects (utility/defense), and Utility spells within class-defined budgets. 30+ new spells added."
  - rscadd: "Eight major aspects - Pyromancy, Cryomancy, Fulgurmancy, Geomancy, Kinesis, Augmentation, Ferramancy."
  - rscadd: "12 minor aspects including Aegistcraft, Artifice, Artifice, most of them remixes of previously existing spells, some of them new and original"
  - rscadd: "Spell Implement system. Charge reduction completely eliminated from spell. You now upgrade staffs with gems."
  - rscadd: "Rune ward spell added as a utility spell, letting you inscribe runes with ash"
  - rscadd: "Grimoire / Aspect Picker UI for picking spell, reshaping (rebinding), and spell management. Can be accessed in a read only form in Encyclopedia."
  - rscadd: "Variant system for class (possibly origin in the future) aspect override)"
  - rscadd: "Conjure Armor, Mage Armor removed in favor of the Arcyne Ward system - a universal spell that nearly all mages starts with to conjure a blue-draining skin armor which loses coverage to actual, real armor and drain your blue."
  - rscadd: "Dragonhide and Crystalhide is now an upgrade to the above Arcyne Ward and is a choice of a Minor Aspect. Gives better padded / brigandine armor respectively with 300 integrity."
  - rscadd: "Phalangite Spellblade subclass has been completely reworked."
  - rscadd: "Rituos reworked to no longer grant 1 free spell every dae and 18 spellpoints at the end, instead becoming a one off process to grant you Minor Aspects and Utilities point, with a non-skeletal path"
  - rscadd: "All mage classes with aspect configurations now starts with a finished spellbook. Most of them also start with a choice of staff or wand."
  - balance: "All spells now have charge times and will respect armor and be blocked (Brute) or damage reduced (Burn)"
  - balance: "Spell Guard (blocking / riposting spells) now give 0.5x cooldown"
  - balance: "Only one enchantment can be on an item at a time"
  - balance: "Staff weapon defnse reduced by 2."
  - balance: "Haste grants 3 Speed instead of +5. Buff duration standardized to 2.5 minutes instead of 2 minutes when cast on others. Self duration not changed"
  - balance: "Enchant Weapon, Longstrider, Fire Cascade, Fire Walker, Meteor Storm, Sundering Lightning removed."
  - balance: "Non-projectile spells should no longer be castable across Z level to reduce cheese. This also includes Iron Tempest which is of a similar nature."
  - balance: "Mimic are no longer antimagic."
  - refactor: "(Nearly) All legacy mage spells should be migrated to the new action-based spell system ported from TG / Vanderlin"
  - qol: "Opinionated spell arrangement for aspects - some class granted spells are now arranged to be explicitly after aspect spells."