changes:
  - rscadd: "Adventurer Slots now scales by +2 per 10 players above 70."
  - rscadd: "Wretch slots now have T2 scaling, gaining up to 5 slots so long as there's enough town combat roles to match them and there's no major antagonist (Lich / VL) active in round."
